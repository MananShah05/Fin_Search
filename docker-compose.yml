version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION:-v1.12.0}
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    env_file:
      - ./backend/.env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: ${QDRANT_HTTP_PORT:-6333}
      PORT: ${BACKEND_PORT:-8000}
    depends_on:
      - qdrant
    volumes:
      - ./backend:/app
      - ./backend/service-account.json:/app/service-account.json

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000/api/v1}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  qdrant_data: